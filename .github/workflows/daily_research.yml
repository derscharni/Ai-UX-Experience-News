name: Daily AI UX Research

# Runs every weekday at 07:00 UTC (09:00 CET / 08:00 GMT).
# Can also be triggered manually via the "Run workflow" button.
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date(s) YYYY-MM-DD, comma-separated for backfill. Empty = today."
        required: false
        default: ""
      force:
        description: "Overwrite existing briefings for the given date(s)."
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet anthropic

      - name: Configure git identity
        run: |
          git config user.name  "AI UX Research Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/research_agent.py $ARGS

      - name: Update HTML reader index
        run: python scripts/generate_index.py

      - name: Commit index update (if changed)
        run: |
          git add docs/briefings.json
          if git diff --cached --quiet; then
            echo "Index unchanged."
          else
            git commit -m "Update briefings index for HTML reader"
            git push origin main
          fi

